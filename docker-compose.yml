version: '3.3'

services:
  app:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www/html
      - runtime_data:/var/www/html/runtime
      - assets_data:/var/www/html/web/assets
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ubtdatabase
      MYSQL_USER: ubt
      MYSQL_PASSWORD: secret
      YII_ENV: dev
      YII_DEBUG: "1"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ubtdatabase
      MYSQL_USER: ubt
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  runtime_data:
  assets_data:
