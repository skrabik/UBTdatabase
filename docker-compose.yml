version: '3.3'

services:
  app:
    build: .
    ports:
      - "19080:8080"
    volumes:
      # Весь проект с хоста — редактируешь локально, изменения сразу в контейнере
      - .:/var/www/html
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ubtdatabase
      MYSQL_USER: ubt
      MYSQL_PASSWORD: secret
      YII_ENV: dev
      YII_DEBUG: "1"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ubtdatabase
      MYSQL_USER: ubt
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
