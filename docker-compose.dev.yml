# Локальная разработка: только MySQL. Приложение — php yii serve
# Запуск: docker compose -f docker-compose.dev.yml up -d
# Перед yii serve задайте БД (Windows: set, Linux/Mac: export):
#   MYSQL_HOST=localhost MYSQL_DATABASE=ubtdatabase MYSQL_USER=ubt MYSQL_PASSWORD=secret
# Затем: php yii serve   →  http://localhost:8080

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ubtdatabase
      MYSQL_USER: ubt
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data_dev:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data_dev:
