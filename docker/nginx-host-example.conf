# Пример конфига для Nginx на хосте (без контейнера nginx).
# PHP-FPM слушает на 127.0.0.1:9000 (порт 9000 проброшен из контейнера app).
# Сайт отдаётся с корня (без префикса /ubt/).
#
# root — путь НА ХОСТЕ к папке web проекта (откуда Nginx отдаёт статику).
# SCRIPT_FILENAME — путь ВНУТРИ КОНТЕЙНЕРА (/var/www/html), не меняй.
# В docker-compose том должен маппить твой каталог в /var/www/html, например:
#   volumes: [ "/реальный/путь/к/проекту:/var/www/html" ]
#
# В server {} укажи свой root:
#   root /реальный/путь/к/проекту/web;

location / {
    try_files $uri $uri/ /index.php?$args;
}

location ~ \.php$ {
    fastcgi_pass 127.0.0.1:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/html/web$fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    fastcgi_read_timeout 300;
}

location ~ /\.(ht|git) {
    deny all;
}
