user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    client_max_body_size 128M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;

    server {
        listen 80;
        listen [::]:80;
        server_name creatoma.ru www.creatoma.ru;
        return 301 https://$host$request_uri;
    }

    server {
        # Путь к проекту на хосте (VPS). В контейнере — /var/www/html (volumes в docker-compose).
        set $project_root /home/UBTdatabase;
        set $fcgi_server 127.0.0.1:9000;
        set $fcgi_doc_root /var/www/html/web;

        charset utf-8;
        client_max_body_size 128M;

        listen 443 ssl;
        listen [::]:443 ssl;
        server_name creatoma.ru www.creatoma.ru;

        ssl_certificate     /etc/letsencrypt/live/creatoma.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/creatoma.ru/privkey.pem;

        root $project_root/web;
        index index.php;

        access_log /var/log/nginx/creatoma.access.log combined;
        error_log  /var/log/nginx/creatoma.error.log warn;

        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        location ~ ^/assets/.*\.php$ {
            deny all;
        }

        location ~ /\.(ht|svn|git) {
            deny all;
        }

        location ~ \.php$ {
            try_files $uri =404;
            include fastcgi_params;
            # Путь в контейнере: /var/www/html/web (см. Dockerfile WORKDIR и volumes в docker-compose)
            fastcgi_param SCRIPT_FILENAME $fcgi_doc_root$fastcgi_script_name;
            fastcgi_pass $fcgi_server;
            fastcgi_connect_timeout 60s;
            fastcgi_read_timeout 60s;
        }
    }
}
