# Пример блока для твоего Nginx на хосте (без контейнера nginx).
# PHP-FPM слушает на 127.0.0.1:9000 (порт 9000 проброшен из контейнера app).

location /ubt/ {
    rewrite ^/ubt/?(.*)$ /$1 break;
    fastcgi_pass 127.0.0.1:9000;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
    fastcgi_param DOCUMENT_ROOT   /var/www/html/web;
    fastcgi_param REQUEST_URI     $uri;
    fastcgi_read_timeout 300;
}
