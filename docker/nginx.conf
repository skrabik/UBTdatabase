# nginx на удалённой машине (не в Docker). PHP-FPM в Docker на порту 9000.
# Путь к проекту на сервере: /home/UBTdatabase

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # HTTP — редирект на HTTPS (для Let's Encrypt оставляем /.well-known)
    server {
        charset utf-8;
        client_max_body_size 128M;

        listen 80;
        #listen [::]:80 default_server ipv6only=on;

        server_name creatoma.ru www.creatoma.ru;
        root /home/UBTdatabase/web;
        index index.php;

        access_log /var/log/nginx/ubtdatabase-access.log;
        error_log  /var/log/nginx/ubtdatabase-error.log;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        charset utf-8;
        client_max_body_size 128M;

        listen 443 ssl http2;
        #listen [::]:443 ssl http2;

        server_name creatoma.ru www.creatoma.ru;

        ssl_certificate     /etc/letsencrypt/live/creatoma.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/creatoma.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        root /home/UBTdatabase/web;
        index index.php;

        access_log /var/log/nginx/ubtdatabase-access.log;
        error_log  /var/log/nginx/ubtdatabase-error.log;

        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # deny accessing php files for the /assets directory
        location ~ ^/assets/.*\.php$ {
            deny all;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/web$fastcgi_script_name;
            fastcgi_pass 127.0.0.1:9000;
            try_files $uri =404;
        }

        location ~* /\. {
            deny all;
        }
    }
}
